name: Docker Image

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/workflows/*.disabled'
  pull_request:
    branches:
      - main
      - master
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/workflows/*.disabled'
  workflow_dispatch:
    inputs:
      version:
        description: 'Custom version, for example 0.1.127'
        required: false
        default: 'cache1.4'
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DEFAULT_IMAGE_VERSION: cache1.4

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set lowercase image name
        id: image
        run: |
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set build metadata
        id: build_meta
        run: |
          CUSTOM_VERSION="${{ github.event.inputs.version || env.DEFAULT_IMAGE_VERSION }}"
          if [[ -n "${CUSTOM_VERSION}" ]]; then
            VERSION="${CUSTOM_VERSION#v}"
            IS_CUSTOM=true
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            IS_CUSTOM=false
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            VERSION="pr-${{ github.event.pull_request.number }}"
            IS_CUSTOM=false
          else
            VERSION="${GITHUB_REF_NAME}"
            IS_CUSTOM=false
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "is_custom=${IS_CUSTOM}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "Building version: ${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ steps.build_meta.outputs.version }},enable=${{ steps.build_meta.outputs.is_custom }}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=sub2api
            org.opencontainers.image.description=Sub2API - AI API Gateway Platform
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          outputs: ${{ github.event_name == 'pull_request' && 'type=cacheonly' || '' }}
          push: ${{ github.event_name != 'pull_request' }}
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.build_meta.outputs.version }}
            COMMIT=${{ github.sha }}
            DATE=${{ steps.build_meta.outputs.date }}
          cache-from: ${{ github.event_name == 'pull_request' && 'type=gha,scope=sub2api-amd64' || format('type=registry,ref={0}:cache-amd64', steps.image.outputs.name) }}
          cache-to: ${{ github.event_name == 'pull_request' && 'type=gha,mode=max,scope=sub2api-amd64' || format('type=registry,ref={0}:cache-amd64,mode=max', steps.image.outputs.name) }}
