name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  shell:
    name: Apple container shell tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Check deployment scripts
        run: |
          /bin/bash -n deploy/apple-container.sh
          /bin/bash deploy/tests/apple-container-test.sh

  backend-smoke:
    name: Backend smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Verify Go version
        run: test "$(go env GOVERSION)" = "go1.26.5"

      - name: Download Go modules
        working-directory: backend
        run: go mod download

      - name: Run default Go test suite
        working-directory: backend
        run: go test ./...

      - name: Build backend server
        working-directory: backend
        run: make build

  backend-unit:
    name: Backend unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Verify Go version
        run: test "$(go env GOVERSION)" = "go1.26.5"

      - name: Run unit tests
        working-directory: backend
        run: make test-unit

  backend-integration:
    name: Backend integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Verify Go version
        run: test "$(go env GOVERSION)" = "go1.26.5"

      - name: Run integration tests
        working-directory: backend
        run: make test-integration

  backend-lint:
    name: Backend lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Verify Go version
        run: test "$(go env GOVERSION)" = "go1.26.5"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9
          args: --timeout=30m ./...
          working-directory: backend

  frontend:
    name: Frontend lint, test and build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        working-directory: frontend
        run: pnpm run lint:check

      - name: Typecheck frontend
        working-directory: frontend
        run: pnpm run typecheck

      - name: Run frontend tests
        working-directory: frontend
        run: pnpm run test:run

      - name: Build frontend
        working-directory: frontend
        run: pnpm run build
